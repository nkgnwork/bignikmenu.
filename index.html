<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asistente — Las Vicuñas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bd:#3B1F0E;--bm:#6B3A1F;--bw:#8B5A2B;--bl:#C49A6C;
      --cr:#F5EFE6;--cd:#EDE3D5;--sa:#D4B896;--td:#2A1508;--wh:#FDFAF6;
    }
    body{font-family:'Jost',sans-serif;background:var(--cr);min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      background-image:radial-gradient(ellipse at 20% 50%,rgba(139,90,43,.08) 0%,transparent 60%),
        radial-gradient(ellipse at 80% 20%,rgba(59,31,14,.06) 0%,transparent 50%);}
    .wrap{width:100%;max-width:820px;height:96vh;max-height:920px;display:flex;
      flex-direction:column;background:var(--wh);border-radius:2px;
      box-shadow:0 2px 4px rgba(59,31,14,.06),0 12px 40px rgba(59,31,14,.12),0 40px 80px rgba(59,31,14,.08);
      overflow:hidden;border:1px solid rgba(139,90,43,.15);}

    /* HEADER */
    .hdr{background:var(--bd);padding:13px 18px;display:flex;align-items:center;
      justify-content:space-between;flex-shrink:0;position:relative;gap:10px;flex-wrap:wrap;}
    .hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--bl),transparent);}
    .hl{display:flex;align-items:center;gap:11px;flex-shrink:0}
    .lm{width:36px;height:36px;background:rgba(196,154,108,.15);border:1px solid rgba(196,154,108,.3);
      border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .lm svg{width:20px;height:20px}
    .htitle{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--cr);letter-spacing:.04em;line-height:1}
    .hsub{font-size:.6rem;font-weight:300;color:var(--bl);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
    .hr2{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .sdot{display:flex;align-items:center;gap:5px;font-size:.6rem;font-weight:300;color:var(--sa);letter-spacing:.08em;flex-shrink:0}
    .dot{width:6px;height:6px;background:#7ec99a;border-radius:50%;animation:pulse 2.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .langs{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.07);
      border:1px solid rgba(196,154,108,.25);border-radius:2px;padding:3px 4px}
    .lb{background:transparent;border:none;cursor:pointer;font-family:'Jost',sans-serif;
      font-size:.58rem;font-weight:400;letter-spacing:.06em;color:var(--sa);
      padding:3px 5px;border-radius:1px;transition:all .2s;opacity:.6;white-space:nowrap}
    .lb:hover{opacity:1;color:var(--cr)}
    .lb.active{background:rgba(196,154,108,.2);color:var(--cr);opacity:1}
    .lsep{color:rgba(196,154,108,.3);font-size:.55rem;user-select:none}

    /* TABS */
    .tabs{display:flex;border-bottom:1px solid var(--cd);flex-shrink:0;background:var(--wh)}
    .tab{flex:1;padding:10px 6px;font-family:'Jost',sans-serif;font-size:.68rem;font-weight:400;
      letter-spacing:.08em;text-transform:uppercase;color:var(--bw);background:transparent;
      border:none;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;opacity:.55}
    .tab:hover{opacity:.85}
    .tab.active{opacity:1;color:var(--bd);border-bottom-color:var(--bw);font-weight:500}

    /* PANELS */
    .panel{display:none;flex:1;overflow:hidden;flex-direction:column}
    .panel.active{display:flex}

    /* CHAT */
    .msgs{flex:1;overflow-y:auto;padding:22px 22px 10px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
    .msgs::-webkit-scrollbar{width:4px}
    .msgs::-webkit-scrollbar-thumb{background:var(--sa);border-radius:2px}
    .wmsg{text-align:center;padding:10px 0 4px;animation:fup .6s ease both}
    .wline{width:36px;height:1px;background:var(--sa);margin:0 auto 11px}
    .wmsg p{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:var(--bw);font-weight:300;line-height:1.6}
    .wmsg small{display:block;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--bl);margin-top:5px}
    .mrow{display:flex;gap:9px;animation:fup .35s ease both}
    .mrow.user{flex-direction:row-reverse}
    @keyframes fup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:500;letter-spacing:.04em;margin-top:2px}
    .av.bot{background:var(--bd);color:var(--cr);border:1px solid var(--bm)}
    .av.uav{background:var(--cd);color:var(--bm);border:1px solid var(--sa)}
    .bbl{max-width:70%;padding:10px 14px;border-radius:2px;font-size:.855rem;line-height:1.7;font-weight:300}
    .mrow.bot .bbl{background:var(--cr);color:var(--td);border:1px solid var(--cd);border-top-left-radius:0}
    .mrow.user .bbl{background:var(--bd);color:var(--cr);border-top-right-radius:0}
    .bbl strong{font-weight:500}.bbl em{font-style:italic;opacity:.85}
    .bbl ul,.bbl ol{padding-left:1.2em;margin:5px 0}.bbl li{margin-bottom:3px}
    .bbl p{margin-bottom:5px}.bbl p:last-child{margin-bottom:0}
    .bbl code{font-family:monospace;font-size:.82em;background:rgba(0,0,0,.08);padding:1px 5px;border-radius:2px}
    .mrow.user .bbl code{background:rgba(255,255,255,.15)}
    .bbl h1,.bbl h2,.bbl h3{font-family:'Cormorant Garamond',serif;font-weight:600;margin:7px 0 3px}
    .typ{display:none;align-items:center;gap:9px;padding:0 22px 9px}
    .typ.on{display:flex}
    .tdots{background:var(--cr);border:1px solid var(--cd);border-top-left-radius:0;border-radius:2px;padding:10px 14px;display:flex;gap:5px;align-items:center}
    .tdots span{width:5px;height:5px;background:var(--bl);border-radius:50%;animation:bnc 1.2s ease-in-out infinite}
    .tdots span:nth-child(2){animation-delay:.2s}.tdots span:nth-child(3){animation-delay:.4s}
    @keyframes bnc{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
    .divider{height:1px;background:linear-gradient(90deg,transparent,var(--cd),transparent);margin:0 22px;flex-shrink:0}
    .ftr{padding:12px 18px 15px;flex-shrink:0;background:var(--wh)}
    .suggs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
    .sg{background:transparent;border:1px solid var(--sa);border-radius:2px;padding:3px 9px;
      font-family:'Jost',sans-serif;font-size:.66rem;font-weight:300;color:var(--bm);
      letter-spacing:.04em;cursor:pointer;transition:all .2s}
    .sg:hover{background:var(--cd);border-color:var(--bl)}
    .irow{display:flex;align-items:flex-end;gap:7px;background:var(--cr);
      border:1px solid var(--cd);border-radius:2px;padding:7px 7px 7px 13px;transition:border-color .2s}
    .irow:focus-within{border-color:var(--bl);box-shadow:0 0 0 3px rgba(139,90,43,.07)}
    #inp{flex:1;border:none;background:transparent;font-family:'Jost',sans-serif;
      font-size:.855rem;font-weight:300;color:var(--td);resize:none;outline:none;line-height:1.6;max-height:110px;min-height:21px}
    #inp::placeholder{color:var(--bl);opacity:.7}
    .bcl,.bsn{border:none;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .bcl{background:transparent;color:var(--bl);width:27px;height:27px;opacity:.6}
    .bcl:hover{opacity:1;color:var(--bm)}
    .bsn{background:var(--bd);color:var(--cr);width:31px;height:31px}
    .bsn:hover{background:var(--bm)}.bsn:disabled{opacity:.4;cursor:not-allowed}
    .fnote{text-align:center;font-size:.57rem;letter-spacing:.1em;text-transform:uppercase;color:var(--bl);opacity:.5;margin-top:7px}

    /* DESTINOS */
    .dest-grid{flex:1;overflow-y:auto;padding:16px;
      display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;align-content:start}
    .dest-grid::-webkit-scrollbar{width:4px}
    .dest-grid::-webkit-scrollbar-thumb{background:var(--sa);border-radius:2px}
    .dcard{border:1px solid var(--cd);border-radius:2px;overflow:hidden;background:var(--wh);
      transition:all .25s;cursor:pointer;display:flex;flex-direction:column}
    .dcard:hover{border-color:var(--bl);box-shadow:0 4px 20px rgba(59,31,14,.12);transform:translateY(-2px)}
    .dcard-imgbox{width:100%;height:145px;overflow:hidden;flex-shrink:0;position:relative;
      background:linear-gradient(135deg,var(--cd),var(--sa))}
    .dcard-imgbox img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
    .dcard:hover .dcard-imgbox img{transform:scale(1.05)}
    .dinfo{padding:11px 13px}
    .dname{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:600;color:var(--bd);letter-spacing:.02em;margin-bottom:2px}
    .ddist{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--bl);margin-bottom:6px}
    .ddesc{font-size:.74rem;font-weight:300;color:var(--bm);line-height:1.5}

    /* MODAL */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(42,21,8,.65);
      z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
    .modal-bg.open{display:flex}
    .modal{background:var(--wh);border-radius:2px;max-width:560px;width:100%;
      max-height:90vh;overflow-y:auto;border:1px solid var(--cd);box-shadow:0 24px 64px rgba(42,21,8,.35)}
    .modal-imgbox{width:100%;height:240px;overflow:hidden;
      background:linear-gradient(135deg,var(--cd),var(--sa));
      display:flex;align-items:center;justify-content:center}
    .modal-imgbox img{width:100%;height:100%;object-fit:cover;display:block}
    .modal-body{padding:20px 22px 22px}
    .modal-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--bd);margin-bottom:3px}
    .modal-dist{font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--bl);margin-bottom:12px}
    .modal-desc{font-size:.83rem;font-weight:300;color:var(--td);line-height:1.72;margin-bottom:14px}
    .modal-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
    .mtag{background:var(--cr);border:1px solid var(--sa);border-radius:1px;
      padding:3px 9px;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--bm)}
    .modal-close{width:100%;padding:9px;background:var(--bd);color:var(--cr);border:none;
      border-radius:2px;cursor:pointer;font-family:'Jost',sans-serif;font-size:.72rem;
      letter-spacing:.1em;text-transform:uppercase;transition:background .2s}
    .modal-close:hover{background:var(--bm)}
  </style>
</head>
<body>
<div class="wrap">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hl">
      <div class="lm">
        <svg viewBox="0 0 60 60" fill="none">
          <path d="M14 42 Q12 36 13 30 Q14 24 18 20 Q20 17 22 16 L22 12 L24 12 L24 16 Q27 15 29 18 Q32 22 31 30 Q30 36 28 42 Z" fill="#C49A6C"/>
          <path d="M22 12 Q22 8 24 7 Q26 6 26 8 L26 12 Z" fill="#C49A6C"/>
          <path d="M36 44 Q34 40 35 35 Q36 30 39 27 Q41 25 42 24 L42 21 L43.5 21 L43.5 24 Q46 24 47 27 Q49 31 48 37 Q47 41 45 44 Z" fill="#8B5A2B" opacity=".7"/>
        </svg>
      </div>
      <div>
        <div class="htitle">Las Vicuñas</div>
        <div class="hsub" id="hsub">Asistente · Putre, Altiplano</div>
      </div>
    </div>
    <div class="hr2">
      <div class="langs">
        <button class="lb active" onclick="setLang('es',this)">ES</button><span class="lsep">·</span>
        <button class="lb" onclick="setLang('en',this)">EN</button><span class="lsep">·</span>
        <button class="lb" onclick="setLang('fr',this)">FR</button><span class="lsep">·</span>
        <button class="lb" onclick="setLang('de',this)">DE</button><span class="lsep">·</span>
        <button class="lb" onclick="setLang('pt',this)">PT</button><span class="lsep">·</span>
        <button class="lb" onclick="setLang('it',this)">IT</button><span class="lsep">·</span>
        <button class="lb" onclick="setLang('zh',this)">中文</button>
      </div>
      <div class="sdot"><div class="dot"></div><span id="slbl">En línea</span></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('chat',this)">💬 <span id="tl-chat">Asistente</span></button>
    <button class="tab" onclick="showTab('dest',this)">🗺️ <span id="tl-dest">Destinos</span></button>
  </div>

  <!-- CHAT -->
  <div class="panel active" id="panel-chat">
    <div class="msgs" id="msgs">
      <div class="wmsg">
        <div class="wline"></div>
        <p id="wtxt">Bienvenido al Hotel Las Vicuñas.<br/>Estoy aquí para ayudarte con tu estadía y todo lo que Putre tiene para ofrecer.</p>
        <small>Putre · 3.500 msnm · Región de Arica y Parinacota</small>
      </div>
    </div>
    <div class="typ" id="typ">
      <div class="av bot">LV</div>
      <div class="tdots"><span></span><span></span><span></span></div>
    </div>
    <div class="divider"></div>
    <div class="ftr">
      <div class="suggs" id="suggs"></div>
      <div class="irow">
        <textarea id="inp" rows="1" maxlength="1000" placeholder="Escribe tu pregunta…"></textarea>
        <button class="bcl" onclick="clearChat()" title="Limpiar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
          </svg>
        </button>
        <button class="bsn" id="bsn" onclick="send()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="fnote">Hotel Las Vicuñas · Baquedano 80, Putre · Chile</div>
    </div>
  </div>

  <!-- DESTINOS -->
  <div class="panel" id="panel-dest">
    <div class="dest-grid" id="dest-grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-imgbox" id="m-imgbox">
      <img id="m-img" src="" alt="" style="display:none"/>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="m-name"></div>
      <div class="modal-dist" id="m-dist"></div>
      <div class="modal-desc" id="m-desc"></div>
      <div class="modal-tags" id="m-tags"></div>
      <button class="modal-close" id="m-close" onclick="document.getElementById('modal-bg').classList.remove('open')">Cerrar</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
// La llamada va al proxy local — no expone la API key en el browser
const API_ENDPOINT = '/api/chat';

const INFO = {
  wifi:'LasVicunas2024',
  bfWD:'07:30–09:30 hrs',
  bfWE:'08:00–10:00 hrs',
  ci:'14:00 hrs',
  co:'12:00 hrs'
};

// ─── DESTINATIONS ─────────────────────────────────────────────────────────────
const DESTS = [
  { id:'parinacota', wikiAPI:'Parinacota,_Chile',   name:'Pueblo de Parinacota', dist_km:47,
    tags:['Patrimonio','Cultura Aymara','Iglesia Colonial','4.392 msnm'],
    desc:{
      es:'Pequeño pueblo altiplánico a 4.392 msnm dentro del Parque Nacional Lauca. Su iglesia colonial del siglo XVII es Monumento Nacional. Habitado por la comunidad aymara con artesanías y tejidos únicos. Desde aquí se aprecian los volcanes Parinacota (6.342 m) y Pomerape.',
      en:'Altiplano village at 4,392m within Lauca National Park. 17th-century colonial church is a National Monument. Aymara community with crafts and textiles. Parinacota (6,342m) and Pomerape volcanoes visible.',
      fr:'Village d\'altiplano à 4 392 m. Église coloniale XVIIe s., Monument National. Communauté aymara. Volcans Parinacota et Pomerape visibles.',
      de:'Altiplano-Dorf auf 4.392m. Kolonialkirche 17. Jh., Nationales Denkmal. Aymara-Gemeinschaft. Vulkane sichtbar.',
      pt:'Vilarejo no altiplano a 4.392m. Igreja colonial séc. XVII, Monumento Nacional. Comunidade aymara.',
      it:'Villaggio dell\'altiplano a 4.392m. Chiesa coloniale XVII sec., Monumento Nazionale. Comunità aymara.',
      zh:'帕里纳科塔村，海拔4392米，劳卡国家公园内。17世纪殖民教堂，艾马拉社区。'
    }
  },
  { id:'chungara', wikiAPI:'Chungará_Lake', name:'Lago Chungará', dist_km:55,
    tags:['4.520 msnm','Flamencos','Vicuñas','Parque Lauca'],
    desc:{
      es:'Uno de los lagos más altos del mundo a 4.520 msnm en el Parque Nacional Lauca. Sus aguas reflejan los volcanes Parinacota y Pomerape. Tres especies de flamencos, patos y vicuñas.',
      en:'One of the world\'s highest lakes at 4,520m in Lauca National Park. Reflects Parinacota and Pomerape volcanoes. Three flamingo species, ducks and vicuñas.',
      fr:'L\'un des lacs les plus hauts du monde à 4 520 m. Reflète Parinacota et Pomerape. Flamants roses, canards, vigognes.',
      de:'Einer der höchsten Seen der Welt, 4.520m. Spiegelt Parinacota und Pomerape. Flamingos, Vikunjas.',
      pt:'Um dos lagos mais altos, 4.520m. Reflete os vulcões. Três espécies de flamingos.',
      it:'Uno dei laghi più alti, 4.520m. Riflette i vulcani. Tre specie di fenicotteri.',
      zh:'世界最高湖泊之一，4520米，映照帕里纳科塔和波梅拉佩火山。'
    }
  },
  { id:'cotacotani', wikiAPI:'Cotacotani_Lake', name:'Lagunas Cotacotani', dist_km:52,
    tags:['3 especies flamencos','Bofedales','Fotografía','Trekking'],
    desc:{
      es:'Sistema de lagunas volcánicas a 4.500 msnm entre Parinacota y el Lago Chungará. Refugio de las tres especies de flamencos sudamericanos. Sendero atraviesa bofedales con vistas a los volcanes Payachatas.',
      en:'Volcanic lagoon system at 4,500m between Parinacota and Lake Chungará. All three South American flamingo species. Trail through bofedales with volcano views.',
      fr:'Lagunes volcaniques à 4 500 m. Les trois espèces de flamants sud-américains.',
      de:'Vulkanlagunen auf 4.500m. Alle drei südamerikanischen Flamingo-Arten.',
      pt:'Lagoas vulcânicas a 4.500m. Três espécies de flamingos sul-americanos.',
      it:'Lagune vulcaniche a 4.500m. Tre specie di fenicotteri.',
      zh:'科塔科塔尼火山湖群，海拔4500米，三种南美火烈鸟。'
    }
  },
  { id:'surire', wikiAPI:'Surire_Salt_Flat', name:'Salar de Surire', dist_km:96,
    tags:['Monumento Natural','3 especies flamencos','4.245 msnm','4×4'],
    desc:{
      es:'Monumento Natural a 4.245 msnm a 96 km de Putre. Vasto salar con las tres especies de flamencos de Sudamérica. También vicuñas, suris y zorros. Requiere 4x4.',
      en:'Natural Monument at 4,245m, 96km from Putre. All three South American flamingo species. Vicuñas, suris, foxes. 4x4 required.',
      fr:'Monument Naturel à 4 245 m, 96 km. Trois espèces flamants. 4x4.',
      de:'Naturdenkmal 4.245m, 96km. Drei Flamingo-Arten. 4x4 nötig.',
      pt:'Monumento Natural 4.245m, 96km. Três espécies flamingos. 4x4.',
      it:'Monumento Naturale 4.245m, 96km. Tre fenicotteri. 4x4.',
      zh:'苏里雷盐沼，自然纪念物4245米，96公里，三种火烈鸟，需四驱车。'
    }
  },
  { id:'suriplaza', wikiAPI:'Taapaca', name:'Suriplaza', dist_km:70,
    tags:['Cerros coloridos','Trekking','Cóndores','Suris'],
    desc:{
      es:'Anfiteatro natural de cerros de colores espectaculares: rojizos, ocres, amarillos y blancos por mineralización volcánica. A unos 70 km de Putre. Ideal para trekking. Se observan suris, vicuñas y cóndores andinos.',
      en:'Natural amphitheater of spectacularly colored hills — reds, ochres, yellows, whites from volcanic mineralization. ~70km from Putre. Trekking, suris, vicuñas, Andean condors.',

      de:'Natürliches Amphitheater mit Vulkanfarben. 70km von Putre. Trekking, Kondore.',
      pt:'Anfiteatro natural com cores vulcânicas. 70km de Putre. Trekking, condores.',
      it:'Anfiteatro naturale con colori vulcanici. 70km da Putre. Trekking, condor.',
      zh:'天然圆形剧场，火山矿化彩色山丘，距普特雷约70公里，徒步，秃鹰。'
    }
  },
  { id:'lauca', wikiAPI:'Lauca_National_Park', name:'Parque Nacional Lauca', dist_km:45,

// ─── STATE ────────────────────────────────────────────────────────────────────
let lang='es', hist=[], busy=false;
const imgCache={};

// ─── TABS ─────────────────────────────────────────────────────────────────────
function showTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
}

// ─── LANG ─────────────────────────────────────────────────────────────────────
function setLang(l,btn){
  lang=l; const t=T[l];
  document.getElementById('hsub').textContent=t.sub;
  document.getElementById('slbl').textContent=t.status;
  document.getElementById('wtxt').innerHTML=t.welcome;
  document.getElementById('inp').placeholder=t.ph;
  document.getElementById('tl-chat').textContent=t.tchat;
  document.getElementById('tl-dest').textContent=t.tdest;
  document.getElementById('m-close').textContent=t.close;
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  hist=[]; clearMsgs(); renderSuggs(); updateDestText();
}

// ─── SUGGESTIONS ──────────────────────────────────────────────────────────────
function renderSuggs(){
  const c=document.getElementById('suggs'); c.innerHTML='';
  T[lang].suggs.forEach(s=>{
    const b=document.createElement('button'); b.className='sg'; b.textContent=s;
    b.onclick=()=>sendSugg(s); c.appendChild(b);
  }); c.style.display='flex';
}

// ─── WIKI IMAGE ───────────────────────────────────────────────────────────────
async function fetchWikiThumb(title){
  try{
    const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    if(!r.ok) return null;
    const d=await r.json();
    return d.thumbnail?.source||null;
  }catch{return null;}
}

// ─── DESTINATIONS ─────────────────────────────────────────────────────────────
function renderDests(){
  const grid=document.getElementById('dest-grid'); grid.innerHTML='';
  DESTS.forEach(d=>{
    const card=document.createElement('div'); card.className='dcard';
    card.onclick=()=>openModal(d);
    const box=document.createElement('div'); box.className='dcard-imgbox'; box.id='box-'+d.id;
    const info=document.createElement('div'); info.className='dinfo';
    info.innerHTML=`<div class="dname">${d.name}</div>
      <div class="ddist" id="dist-${d.id}">📍 ${d.dist_km} ${T[lang].km}</div>
      <div class="ddesc" id="ddesc-${d.id}">${(d.desc[lang]||d.desc.es).substring(0,90)}…</div>`;
    card.appendChild(box); card.appendChild(info);
    grid.appendChild(card);
    (async()=>{
      if(!imgCache[d.id]) imgCache[d.id]=await fetchWikiThumb(d.wikiAPI);
      if(imgCache[d.id]){
        const img=document.createElement('img'); img.src=imgCache[d.id]; img.alt=d.name;
        img.onload=()=>{const b=document.getElementById('box-'+d.id);if(b){b.innerHTML='';b.appendChild(img);}};
      }
    })();
  });
}

function updateDestText(){
  DESTS.forEach(d=>{
    const dist=document.getElementById('dist-'+d.id);
    const desc=document.getElementById('ddesc-'+d.id);
    if(dist) dist.textContent=`📍 ${d.dist_km} ${T[lang].km}`;
    if(desc) desc.textContent=(d.desc[lang]||d.desc.es).substring(0,90)+'…';
  });
}

async function openModal(d){
  document.getElementById('m-name').textContent=d.name;
  document.getElementById('m-dist').textContent=`📍 ${d.dist_km} ${T[lang].km}`;
  document.getElementById('m-desc').textContent=d.desc[lang]||d.desc.es;
  document.getElementById('m-close').textContent=T[lang].close;
  const tags=document.getElementById('m-tags'); tags.innerHTML='';
  d.tags.forEach(t=>{const s=document.createElement('span');s.className='mtag';s.textContent=t;tags.appendChild(s);});
  const mimg=document.getElementById('m-img'); mimg.style.display='none';
  document.getElementById('modal-bg').classList.add('open');
  if(!imgCache[d.id]) imgCache[d.id]=await fetchWikiThumb(d.wikiAPI);
  if(imgCache[d.id]){mimg.src=imgCache[d.id];mimg.onload=()=>{mimg.style.display='block';};}
}

// ─── MARKDOWN ─────────────────────────────────────────────────────────────────
function md(t){
  return t
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br/>');
}

// ─── MESSAGES ─────────────────────────────────────────────────────────────────
function addMsg(role,text){
  const c=document.getElementById('msgs');
  const row=document.createElement('div'); row.className=`mrow ${role}`;
  const av=document.createElement('div'); av.className=`av ${role==='bot'?'bot':'uav'}`; av.textContent=role==='bot'?'LV':T[lang].ul;
  const bbl=document.createElement('div'); bbl.className='bbl';
  if(role==='bot') bbl.innerHTML=`<p>${md(text)}</p>`; else bbl.textContent=text;
  row.appendChild(av); row.appendChild(bbl); c.appendChild(row); c.scrollTop=c.scrollHeight;
}
function showTyp(on){document.getElementById('typ').style.display=on?'flex':'none';if(on)document.getElementById('msgs').scrollTop=9999;}

// ─── SEND — llama al proxy local /api/chat ────────────────────────────────────
async function send(){
  if(busy) return;
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();
  if(!txt) return;
  document.getElementById('suggs').style.display='none';
  inp.value=''; inp.style.height='auto';
  addMsg('user',txt);
  hist.push({role:'user',content:txt});
  busy=true; document.getElementById('bsn').disabled=true; showTyp(true);
  try{
    const res=await fetch(API_ENDPOINT,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:T[lang].sys,
        messages:hist
      })
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data?.error?.message||`HTTP ${res.status}`);
    const reply=data.content?.[0]?.text;
    if(!reply) throw new Error('Respuesta vacía');
    hist.push({role:'assistant',content:reply});
    showTyp(false); addMsg('bot',reply);
  }catch(e){
    showTyp(false);
    console.error('Chat error:',e);
    addMsg('bot',{
      es:'Lo siento, hubo un error al procesar tu mensaje. Por favor intenta de nuevo.',
      en:'Sorry, there was an error. Please try again.',
      fr:'Désolé, une erreur s\'est produite. Veuillez réessayer.',
      de:'Entschuldigung, ein Fehler ist aufgetreten. Bitte versuchen Sie es erneut.',
      pt:'Desculpe, ocorreu um erro. Por favor tente novamente.',
      it:'Spiacente, si è verificato un errore. Riprova.',
      zh:'抱歉，发生了错误，请重试。'
    }[lang]);
  }
  busy=false; document.getElementById('bsn').disabled=false; inp.focus();
}

function sendSugg(t){document.getElementById('inp').value=t; send();}
function clearMsgs(){const c=document.getElementById('msgs');while(c.children.length>1)c.removeChild(c.lastChild);renderSuggs();}
function clearChat(){hist=[];clearMsgs();}
document.getElementById('inp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px';});
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderSuggs();
renderDests();
</script>
